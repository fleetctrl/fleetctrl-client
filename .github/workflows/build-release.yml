name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~\go\pkg\mod
            ~\AppData\Local\go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**\\go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            rust-client\target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-client\\Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Extract version from tag
        id: extract_version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Go Reference (Windows)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "bin" | Out-Null
          go build -o ".\bin\fleetctrl-client-go.exe" ".\cmd\main\"
          $version = "${{ steps.extract_version.outputs.version }}"
          Copy-Item ".\bin\fleetctrl-client-go.exe" ".\bin\fleetctrl-client-go-$version.exe" -Force

      - name: Build Rust Client (Windows)
        shell: pwsh
        run: |
          cargo test --manifest-path rust-client/Cargo.toml --workspace
          cargo build --manifest-path rust-client/Cargo.toml --release -p fleetctrl-client
          $version = "${{ steps.extract_version.outputs.version }}"
          Copy-Item ".\rust-client\target\release\fleetctrl-client.exe" ".\bin\fleetctrl-client.exe" -Force
          Copy-Item ".\bin\fleetctrl-client.exe" ".\bin\fleetctrl-client-$version.exe" -Force

      - name: Install WiX Toolset v4
        shell: pwsh
        run: |
          $wixVersion = "4.0.0"
          dotnet tool update --global wix --version $wixVersion
          if ($LASTEXITCODE -ne 0) {
            dotnet tool install --global wix --version $wixVersion
          }
          wix extension add -g "WixToolset.UI.wixext/$wixVersion"
          wix extension add -g "WixToolset.Util.wixext/$wixVersion"

      - name: Build MSI
        shell: pwsh
        run: |
          $version = "${{ steps.extract_version.outputs.version }}"
          wix build installer/installer.wxs `
            -ext WixToolset.UI.wixext `
            -ext WixToolset.Util.wixext `
            -d Version=$version `
            -arch x64 `
            -o "bin/fleetctrl-client-$version.msi"

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            ./bin/fleetctrl-client.exe
            ./bin/fleetctrl-client-${{ steps.extract_version.outputs.version }}.exe
            ./bin/fleetctrl-client-go.exe
            ./bin/fleetctrl-client-go-${{ steps.extract_version.outputs.version }}.exe
            ./bin/fleetctrl-client-${{ steps.extract_version.outputs.version }}.msi
          draft: true
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
