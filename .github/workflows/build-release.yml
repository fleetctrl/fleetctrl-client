name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~\go\pkg\mod
            ~\AppData\Local\go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**\\go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Extract version (PowerShell)
        id: extract_version
        shell: pwsh
        run: |
          $pattern = '^\s*Version\s*=\s*"([^"]+)"'
          $match = Select-String -Path "internal\const\consts.go" -Pattern $pattern -Encoding UTF8
          if (-not $match) { Write-Error "Version not found in internal\const\consts.go"; exit 1 }
          $version = $match.Matches[0].Groups[1].Value
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build (Windows)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "bin" | Out-Null
          go build -o ".\bin\fleetctrl-client.exe" ".\cmd\main\"
          $version = "${{ steps.extract_version.outputs.version }}"
          Copy-Item ".\bin\fleetctrl-client.exe" ".\bin\fleetctrl-client-$version.exe" -Force

      - name: Install WiX Toolset v4
        shell: pwsh
        run: |
          $wixVersion = "4.0.0"
          dotnet tool update --global wix --version $wixVersion
          if ($LASTEXITCODE -ne 0) {
            dotnet tool install --global wix --version $wixVersion
          }
          wix extension add -g "WixToolset.UI.wixext/$wixVersion"
          wix extension add -g "WixToolset.Util.wixext/$wixVersion"

      - name: Build MSI
        shell: pwsh
        run: |
          $version = "${{ steps.extract_version.outputs.version }}"
          wix build installer/installer.wxs `
            -ext WixToolset.UI.wixext `
            -ext WixToolset.Util.wixext `
            -d Version=$version `
            -arch x64 `
            -o "bin/fleetctrl-client-$version.msi"

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.extract_version.outputs.version }}
          tag_name: ${{ steps.extract_version.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: |
            ./bin/fleetctrl-client.exe
            ./bin/fleetctrl-client-${{ steps.extract_version.outputs.version }}.exe
            ./bin/fleetctrl-client-${{ steps.extract_version.outputs.version }}.msi
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
